name = "maplestar-guild-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "guild-db"
database_id = "83397dc6-14ed-40b1-bdf3-fc9f90dfa783"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "maplestar-guild-images"

[triggers]
# 0분: 캐릭터 랭킹 (11배치 순환, ~11시간 완전 갱신)
# 30분: 무릉도장 현재 회차 전체 직업군 갱신 (매시간)
# 매일 01:45 UTC(10:45 KST): 무릉 회차 전환 감지
crons = ["0 * * * *", "30 * * * *", "45 1 * * *"]

[dev]
port = 8787
local_protocol = "http"
