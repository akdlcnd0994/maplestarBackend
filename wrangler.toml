name = "maplestar-guild-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
WORKER_HOST = "https://api.maplestar.app"

[[d1_databases]]
binding = "DB"
database_name = "guild-db"
database_id = "83397dc6-14ed-40b1-bdf3-fc9f90dfa783"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "maplestar-guild-images"

[triggers]
# 0분: 캐릭터 랭킹 (11배치 순환, ~11시간 완전 갱신)
# 30분: 무릉도장 현재 회차 전체 직업군 갱신 (매시간)
# 35분: 무릉도장 현재 회차 캐시 무효화 (30분 스크래핑 완료 후 새 데이터로 재캐싱 유도)
# 매일 01:45 UTC(10:45 KST): 무릉 회차 전환 감지
# 매 2시간마다: 무릉 과거 회차 캐시 워밍 (Cloudflare Cache LRU eviction 대비, 캐시 있으면 즉시 스킵)
crons = ["0 * * * *", "30 * * * *", "35 * * * *", "45 1 * * *", "0 */2 * * *"]

[dev]
port = 8787
local_protocol = "http"
